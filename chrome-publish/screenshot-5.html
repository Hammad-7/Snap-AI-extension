<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>SnapAI — Screenshot 5 (1280x800)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1280px; height: 800px; overflow: hidden; }

        body {
            background: #0F0F14;
            font-family: 'DM Sans', sans-serif;
            color: #F1F0F5;
            display: flex;
            align-items: center;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: 100px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 60%);
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: 0;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
        }

        .layout {
            display: flex;
            align-items: center;
            gap: 64px;
            padding: 0 72px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .left {
            flex: 0 0 360px;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand-name span {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #F59E0B;
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .headline em {
            font-style: normal;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #9291A5;
            font-size: 16px;
            line-height: 1.6;
            max-width: 340px;
            margin-bottom: 28px;
        }

        .provider-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .provider-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1A1A24;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 10px 16px;
        }

        .provider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .provider-name {
            font-size: 14px;
            font-weight: 600;
            color: #F1F0F5;
        }

        .provider-status {
            margin-left: auto;
            font-size: 11px;
            font-weight: 500;
            color: #06D6A0;
            background: rgba(6, 214, 160, 0.1);
            border-radius: 6px;
            padding: 3px 10px;
        }

        .provider-status.inactive {
            color: #9291A5;
            background: rgba(146, 145, 165, 0.1);
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .screenshot-frame {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
            max-width: 500px;
        }

        .screenshot-frame img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="layout">
        <div class="left">
            <div class="icon-row">
                <svg width="36" height="36" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="s5Bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5" /><stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                    </defs>
                    <rect width="128" height="128" rx="28" fill="url(#s5Bg)" />
                    <path d="M32 44 L32 36 Q32 32 36 32 L44 32" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M96 84 L96 92 Q96 96 92 96 L84 96" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M72 34 L54 62 L66 62 L56 94 L80 58 L66 58 L78 34 Z" fill="white" />
                    <circle cx="88" cy="38" r="2.5" fill="white" opacity="0.7" />
                </svg>
                <div class="brand-name">Snap<span>AI</span></div>
            </div>

            <div class="step-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Popup
            </div>

            <div class="headline"><em>Quick</em><br>Access</div>

            <p class="description">Click the toolbar icon to see your provider status at a glance. Instantly switch providers, check API key status, and access settings.</p>

            <div class="provider-list">
                <div class="provider-item">
                    <div class="provider-dot" style="background: #10A37F;"></div>
                    <span class="provider-name">OpenAI</span>
                    <span class="provider-status">Active</span>
                </div>
                <div class="provider-item">
                    <div class="provider-dot" style="background: #D97706;"></div>
                    <span class="provider-name">Anthropic</span>
                    <span class="provider-status inactive">Not set</span>
                </div>
                <div class="provider-item">
                    <div class="provider-dot" style="background: #4285F4;"></div>
                    <span class="provider-name">Gemini</span>
                    <span class="provider-status inactive">Not set</span>
                </div>
                <div class="provider-item">
                    <div class="provider-dot" style="background: #536DFE;"></div>
                    <span class="provider-name">DeepSeek</span>
                    <span class="provider-status inactive">Not set</span>
                </div>
            </div>
        </div>

        <div class="right">
            <div class="screenshot-frame">
                <img src="Screenshot 2026-02-25 at 10.59.29.png" alt="SnapAI popup with provider status">
            </div>
        </div>
    </div>
</body>

</html>
