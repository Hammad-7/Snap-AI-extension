<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>SnapAI — Screenshot 3 (1280x800)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1280px; height: 800px; overflow: hidden; }

        body {
            background: #0F0F14;
            font-family: 'DM Sans', sans-serif;
            color: #F1F0F5;
            display: flex;
            align-items: center;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            left: 200px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 60%);
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -50px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
        }

        .layout {
            display: flex;
            align-items: center;
            gap: 64px;
            padding: 0 72px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .left {
            flex: 0 0 360px;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand-name span {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(124, 58, 237, 0.12);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #7C3AED;
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .headline em {
            font-style: normal;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #9291A5;
            font-size: 16px;
            line-height: 1.6;
            max-width: 340px;
            margin-bottom: 28px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #9291A5;
        }

        .feature-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(6, 214, 160, 0.12);
            border: 1px solid rgba(6, 214, 160, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #06D6A0;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .screenshot-frame {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
            max-width: 700px;
        }

        .screenshot-frame img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="layout">
        <div class="left">
            <div class="icon-row">
                <svg width="36" height="36" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="s3Bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5" /><stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                    </defs>
                    <rect width="128" height="128" rx="28" fill="url(#s3Bg)" />
                    <path d="M32 44 L32 36 Q32 32 36 32 L44 32" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M96 84 L96 92 Q96 96 92 96 L84 96" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M72 34 L54 62 L66 62 L56 94 L80 58 L66 58 L78 34 Z" fill="white" />
                    <circle cx="88" cy="38" r="2.5" fill="white" opacity="0.7" />
                </svg>
                <div class="brand-name">Snap<span>AI</span></div>
            </div>

            <div class="step-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
                Side Panel
            </div>

            <div class="headline">Full<br><em>Conversations</em></div>

            <p class="description">Open the side panel for a full AI conversation. Ask follow-up questions, dive deeper into topics, and keep the context flowing.</p>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-check">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    Follow-up questions
                </div>
                <div class="feature-item">
                    <div class="feature-check">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    Markdown rendering
                </div>
                <div class="feature-item">
                    <div class="feature-check">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    Stays alongside your page
                </div>
            </div>
        </div>

        <div class="right">
            <div class="screenshot-frame">
                <img src="Screenshot 2026-02-25 at 10.58.41.png" alt="SnapAI side panel conversation">
            </div>
        </div>
    </div>
</body>

</html>
