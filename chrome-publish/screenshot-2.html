<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>SnapAI — Screenshot 2 (1280x800)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1280px; height: 800px; overflow: hidden; }

        body {
            background: #0F0F14;
            font-family: 'DM Sans', sans-serif;
            color: #F1F0F5;
            display: flex;
            align-items: center;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            right: -50px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.10) 0%, transparent 60%);
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -50px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, transparent 60%);
        }

        .layout {
            display: flex;
            align-items: center;
            gap: 64px;
            padding: 0 72px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .left {
            flex: 0 0 360px;
        }

        .icon-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand-name span {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79, 70, 229, 0.12);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #7C3AED;
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .headline em {
            font-style: normal;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #9291A5;
            font-size: 16px;
            line-height: 1.6;
            max-width: 340px;
            margin-bottom: 28px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1A1A24;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #B0AFBF;
        }

        .action-chip svg {
            color: #7C3AED;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .screenshot-frame {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
            max-width: 700px;
        }

        .screenshot-frame img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="layout">
        <div class="left">
            <div class="icon-row">
                <svg width="36" height="36" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="s2Bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5" /><stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                    </defs>
                    <rect width="128" height="128" rx="28" fill="url(#s2Bg)" />
                    <path d="M32 44 L32 36 Q32 32 36 32 L44 32" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M96 84 L96 92 Q96 96 92 96 L84 96" stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M72 34 L54 62 L66 62 L56 94 L80 58 L66 58 L78 34 Z" fill="white" />
                    <circle cx="88" cy="38" r="2.5" fill="white" opacity="0.7" />
                </svg>
                <div class="brand-name">Snap<span>AI</span></div>
            </div>

            <div class="step-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.9V17H8v-2.1A7 7 0 0 1 12 2z"/></svg>
                AI Response
            </div>

            <div class="headline">Inline <em>AI<br>Answers</em></div>

            <p class="description">Get explanations, summaries, and more delivered right below the selected text. AI responses appear in a beautiful floating card.</p>

            <div class="actions">
                <div class="action-chip">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.9V17H8v-2.1A7 7 0 0 1 12 2z"/></svg>
                    Explain
                </div>
                <div class="action-chip">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h12"/><path d="M4 18h8"/></svg>
                    Summarize
                </div>
                <div class="action-chip">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Fix Grammar
                </div>
                <div class="action-chip">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="6" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="18" r="1.5"/><path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/></svg>
                    Key Points
                </div>
            </div>
        </div>

        <div class="right">
            <div class="screenshot-frame">
                <img src="Screenshot 2026-02-25 at 10.58.17.png" alt="SnapAI inline AI response">
            </div>
        </div>
    </div>
</body>

</html>
