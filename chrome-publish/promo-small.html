<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=440, initial-scale=1.0">
    <title>SnapAI — Small Promo (440x280)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 440px;
            height: 280px;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #9333EA 100%);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Decorative selection brackets */
        .bracket-tl, .bracket-br {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .bracket-tl {
            top: 24px;
            left: 24px;
            border-right: none;
            border-bottom: none;
        }

        .bracket-br {
            bottom: 24px;
            right: 24px;
            border-left: none;
            border-top: none;
        }

        /* Subtle glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .orb-1 {
            width: 200px;
            height: 200px;
            top: -60px;
            right: -40px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
        }

        .orb-2 {
            width: 160px;
            height: 160px;
            bottom: -40px;
            left: -30px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.3) 0%, transparent 70%);
        }

        .content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .icon {
            margin-bottom: 12px;
        }

        .name {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .name span {
            opacity: 0.85;
        }

        .tagline {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
            margin-bottom: 20px;
        }

        .pills {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .pill {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pill svg {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="bracket-tl"></div>
    <div class="bracket-br"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="content">
        <div class="icon">
            <svg width="48" height="48" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="128" height="128" rx="28" fill="rgba(255,255,255,0.2)" />
                <path d="M32 44 L32 36 Q32 32 36 32 L44 32" stroke="white" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" fill="none" />
                <path d="M96 84 L96 92 Q96 96 92 96 L84 96" stroke="white" stroke-opacity="0.4" stroke-width="3" stroke-linecap="round" fill="none" />
                <path d="M72 34 L54 62 L66 62 L56 94 L80 58 L66 58 L78 34 Z" fill="white" />
                <circle cx="88" cy="38" r="2.5" fill="white" opacity="0.7" />
                <circle cx="94" cy="48" r="1.5" fill="white" opacity="0.5" />
            </svg>
        </div>
        <div class="name">Snap<span>AI</span></div>
        <div class="tagline">Instant AI Insights for Any Text</div>
        <div class="pills">
            <div class="pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.9V17H8v-2.1A7 7 0 0 1 12 2z"/></svg>
                Explain
            </div>
            <div class="pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h12"/><path d="M4 18h8"/></svg>
                Summarize
            </div>
            <div class="pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Fix Grammar
            </div>
            <div class="pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="6" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="18" r="1.5"/><path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/></svg>
                Key Points
            </div>
        </div>
    </div>
</body>

</html>
